<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login do Barbeiro - SaaS Booking</title>
  <link rel="stylesheet" href="../CSS/modern.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">
  <main class="container" style="max-width: 400px;">
    <h2 class="main-title" style="text-align: center;">Login do Barbeiro</h2>
    <form id="login-form" class="form-section">
      <input type="email" id="email" placeholder="Email" required class="input-field">
      <input type="password" id="password" placeholder="Senha" required class="input-field">
      <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
      <p class="alert" id="alert"></p>
    </form>
  </main>
  <script src="../scripts/login-barber.js"></script>
</body>
</html>
