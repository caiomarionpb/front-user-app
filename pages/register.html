<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar - SaaS Booking</title>
<link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

<header class="header">
  <h1>SaaS Booking</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="register.html">Registrar</a>
    <a href="profile.html">Perfil</a>
  </nav>
</header>

<main class="container">
  <form id="registerForm">
    <h2>Registrar Conta</h2>
    <input type="text" id="name" placeholder="Nome completo" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Senha" required>
    <input type="text" id="number" placeholder="Número de telefone" required>
    <input type="number" id="age" placeholder="Idade" required>
    <button type="submit">Criar Conta</button>
    <p class="alert" id="register-alert"></p>
  </form>
</main>

<script src="../scripts/register.js"></script>
</body>
</html>
